apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: istio-primary
  region: us-east-1
  version: "1.36"

autoModeConfig:
  enabled: false

availabilityZones:
  - us-east-1a
  - us-east-1b

managedNodeGroups:
  - name: demo
    instanceType: m5.large
    minSize: 1
    desiredCapacity: 2
    maxSize: 4
    volumeSize: 20
    volumeType: gp3
    ssh:
      allow: true
      publicKeyName: kp_virginia
    privateNetworking: true
